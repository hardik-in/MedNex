<div class="dashboard-wrapper">
  <div class="dashboard-header">
    <span class="header-eyebrow">Hospital Management</span>
    <h1 class="header-title">Admin Control Panel</h1>
    <p class="dashboard-subtitle">
      Manage hospital operations from a single place.
    </p>
  </div>

  <div class="admin-grid">
    <a routerLink="/admin/doctors" class="admin-card">
      <div class="card-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
      <div class="card-content">
        <h3>Doctors</h3>
        <p>Create and manage doctors</p>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a routerLink="/admin/appointments" class="admin-card">
      <div class="card-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
      </div>
      <div class="card-content">
        <h3>Appointments</h3>
        <p>View all appointments in the system</p>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a routerLink="/admin/create-timeslot" class="admin-card">
      <div class="card-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="16" />
          <line x1="8" y1="12" x2="16" y2="12" />
        </svg>
      </div>
      <div class="card-content">
        <h3>Create Time Slots</h3>
        <p>Generate appointment slots for doctors</p>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a routerLink="/admin/timeslots" class="admin-card">
      <div class="card-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
      </div>
      <div class="card-content">
        <h3>Manage Time Slots</h3>
        <p>View or delete available slots</p>
      </div>
      <div class="card-arrow">→</div>
    </a>
  </div>
</div>
