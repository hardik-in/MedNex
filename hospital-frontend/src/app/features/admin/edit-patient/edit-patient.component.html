<div class="page-wrapper">
  <!-- Header -->
  <div class="page-header">
    <div>
      <span class="page-eyebrow">Patients</span>
      <h1 class="page-title">Edit Patient</h1>
    </div>
    <button
      class="btn-back"
      type="button"
      (click)="router.navigate(['/admin/patients', form.getRawValue().id])"
    >
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="15 18 9 12 15 6" />
      </svg>
      Back to Profile
    </button>
  </div>

  <!-- Form Card -->
  <form [formGroup]="form" (ngSubmit)="requestConfirm()" class="form-card">
    <!-- Identity (read-only) -->
    <div class="form-section">
      <p class="section-label">System Info</p>
      <div class="form-grid">
        <div class="input-group">
          <label>Patient ID</label>
          <input type="text" formControlName="id" class="disabled-field" />
        </div>

        <div class="input-group">
          <label>User ID</label>
          <input type="text" formControlName="userId" class="disabled-field" />
        </div>
      </div>
    </div>

    <!-- Personal Information -->
    <div class="form-section">
      <p class="section-label">Personal Information</p>
      <div class="form-grid">
        <div class="input-group">
          <label>First Name</label>
          <input
            type="text"
            formControlName="firstName"
            placeholder="First name"
          />
        </div>

        <div class="input-group">
          <label>Last Name</label>
          <input
            type="text"
            formControlName="lastName"
            placeholder="Last name"
          />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="patient@example.com"
          />
        </div>

        <div class="input-group">
          <label>Phone Number</label>
          <input
            type="text"
            formControlName="phoneNumber"
            placeholder="+91XXXXXXXXXX"
          />
        </div>

        <div class="input-group">
          <label>Date of Birth</label>
          <input type="date" formControlName="dateOfBirth" />
        </div>

        <div class="input-group">
          <label>Gender</label>
          <select formControlName="gender">
            <option value="">Select gender</option>
            <option value="0">Male</option>
            <option value="1">Female</option>
            <option value="2">Other</option>
          </select>
        </div>

        <div class="input-group full-width">
          <label>Address</label>
          <input
            type="text"
            formControlName="address"
            placeholder="Street, City, State"
          />
        </div>
      </div>
    </div>

    <!-- Medical Information -->
    <div class="form-section">
      <p class="section-label">Medical Information</p>
      <div class="form-grid">
        <div class="input-group">
          <label>Blood Group</label>
          <select formControlName="bloodGroup">
            <option value="">Select blood group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>

        <div class="input-group">
          <label>Allergies</label>
          <input
            type="text"
            formControlName="allergies"
            placeholder="e.g. Penicillin, Peanuts"
          />
        </div>

        <div class="input-group full-width">
          <label>Medical History</label>
          <textarea
            formControlName="medicalHistory"
            placeholder="Relevant past conditions, surgeries, chronic illnesses…"
          ></textarea>
        </div>
      </div>
    </div>

    <!-- Emergency Contact -->
    <div class="form-section">
      <p class="section-label">Emergency Contact</p>
      <div class="form-grid">
        <div class="input-group">
          <label>Contact Name</label>
          <input
            type="text"
            formControlName="emergencyContactName"
            placeholder="Full name"
          />
        </div>

        <div class="input-group">
          <label>Contact Phone</label>
          <input
            type="text"
            formControlName="emergencyContactPhone"
            placeholder="+91XXXXXXXXXX"
          />
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button
        type="button"
        class="btn-cancel"
        (click)="router.navigate(['/admin/patients', form.getRawValue().id])"
      >
        Cancel
      </button>
      <button type="submit" class="btn-submit">Save Changes</button>
    </div>
  </form>
</div>

<!-- Confirm Save Popup -->
<div class="popup-overlay" *ngIf="showConfirmPopup" (click)="cancelConfirm()">
  <div class="popup popup--confirm" (click)="$event.stopPropagation()">
    <div class="confirm-icon">
      <svg
        width="28"
        height="28"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
      </svg>
    </div>

    <h3 class="confirm-title">Save Changes?</h3>
    <p class="confirm-body">
      You're about to update this patient's profile. This will overwrite the
      current information.
    </p>

    <div class="confirm-actions">
      <button type="button" class="btn-cancel" (click)="cancelConfirm()">
        Cancel
      </button>
      <button type="button" class="btn-submit" (click)="confirmSubmit()">
        Yes, Save Changes
      </button>
    </div>
  </div>
</div>
