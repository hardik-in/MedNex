<div class="login-wrapper">
  <div class="fullwidth-ecg top-ecg">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      preserveAspectRatio="none"
      viewBox="0 0 1200 30"
      fill="none"
    >
      <polyline
        class="fw-ecg-line"
        points="0,15 100,15 120,15 130,2 140,28 150,8 160,20 170,15 300,15 320,15 330,2 340,28 350,8 360,20 370,15 500,15 520,15 530,2 540,28 550,8 560,20 570,15 700,15 720,15 730,2 740,28 750,8 760,20 770,15 900,15 920,15 930,2 940,28 950,8 960,20 970,15 1200,15"
      />
    </svg>
  </div>

  <div class="fullwidth-ecg bottom-ecg">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      preserveAspectRatio="none"
      viewBox="0 0 1200 30"
      fill="none"
    >
      <polyline
        class="fw-ecg-line"
        points="0,15 100,15 120,15 130,2 140,28 150,8 160,20 170,15 300,15 320,15 330,2 340,28 350,8 360,20 370,15 500,15 520,15 530,2 540,28 550,8 560,20 570,15 700,15 720,15 730,2 740,28 750,8 760,20 770,15 900,15 920,15 930,2 940,28 950,8 960,20 970,15 1200,15"
      />
    </svg>
  </div>
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="left-content">
      <!-- Brand Row -->
      <div class="brand-row">
        <div class="brand">
          <div class="brand-icon">
            <svg
              class="heartbeat-svg"
              xmlns="http://www.w3.org/2000/svg"
              width="52"
              height="28"
              viewBox="0 0 80 24"
            >
              <polyline
                class="heartbeat-line"
                points="0,12 10,12 14,3 18,21 22,9 26,15 30,12 45,12 49,3 53,21 57,9 61,15 65,12 80,12"
              />
            </svg>
          </div>
          <span class="brand-name">Mednex</span>
        </div>
        <button class="theme-toggle" (click)="theme.toggle()">
          <svg
            *ngIf="theme.isDark()"
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg
            *ngIf="!theme.isDark()"
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>

      <div class="centre-art">
        <!-- Stethoscope -->
        <img
          class="stethoscope-art"
          src="assets/images/stethoscope.png"
          alt=""
          aria-hidden="true"
        />

        <!-- ECG line -->
        <svg
          class="ecg-art"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 300 40"
          fill="none"
        >
          <polyline
            class="ecg-line"
            points="0,20 30,20 38,20 44,4 50,36 56,12 62,24 68,20 120,20 128,20 134,4 140,36 146,12 152,24 158,20 210,20 218,20 224,4 230,36 236,12 242,24 248,20 300,20"
          />
        </svg>

        <!-- Headline -->
        <div class="left-headline">
          <h1>
            Healthcare,<br />
            Streamlined.
          </h1>
          <p>
            A single command center for doctors,
            <br />
            patients, appointments, and more.
          </p>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-grid">
        <div class="stat-card">
          <span class="stat-value">99.9%</span>
          <span class="stat-label">Uptime</span>
        </div>
        <div class="stat-card">
          <span class="stat-value">HIPAA</span>
          <span class="stat-label">Compliant</span>
        </div>
        <div class="stat-card">
          <span class="stat-value">256-bit</span>
          <span class="stat-label">Encrypted</span>
        </div>
      </div>
    </div>

    <!-- Decorative grid lines -->
    <div class="grid-art" aria-hidden="true">
      <div class="grid-line" *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]"></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <form [formGroup]="form" (ngSubmit)="login()" class="login-card">
      <div class="header">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your credentials to access Mednex</p>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="staff@hospital.org"
        />
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-container">
          <input
            [type]="passwordVisible ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
          />
          <button
            type="button"
            class="eye-btn"
            (click)="togglePassword()"
            aria-label="Toggle password visibility"
          >
            <svg
              *ngIf="passwordVisible"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg
              *ngIf="!passwordVisible"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
              <path
                d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
              ></path>
              <path
                d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"
              ></path>
              <line x1="2" y1="2" x2="22" y2="22"></line>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading">
        {{ loading ? "Authenticating..." : "Sign In" }}
      </button>

      <p *ngIf="error" class="error-msg">{{ error }}</p>
      <p class="signin-link">
        Don't have an account? <a routerLink="/register">Register as Patient</a>
      </p>
    </form>
  </div>
</div>
